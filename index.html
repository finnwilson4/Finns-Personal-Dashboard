
<head>
  <title>Dashboard Homepage</title>

  <style>
    body {
      border: 1px solid rgb(255, 255, 255);
      font-family: Arial;
      background: rgb(42, 43, 46);
      text-align: center;
      padding-top: 10px;
    }

    h1 {
      border: 1px dashed rgb(255, 255, 255);
      color: #007631;
      font-size: 50px;
    }

    p {
      color: #fb0606;
      font-size: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #069915;
    }

    .container {
      display: flex;
      gap: 0px;
      border: 1px solid rgb(255, 255, 255);
      border-radius: 5px;
      margin: 10px;
    }

    .box {
      width: 100%;
      border: 1px solid rgb(255, 255, 255);
      border-radius: 5px;
      margin: 10px;
      
    }

    .field {
      display: flex;
      align-items: center;

    }
  </style>
</head>

<body>

  <h1>Finn's Dashboard</h1>
  <h2>Heading 2</h2>
  <h3>Heading 1</h3>
  <h0>Heading 0</h0>

  <p>Paragraph 1</p>

  <button onclick="alert('Website is working!')">
    Test Website :D
  </button>

  <button onclick="alert('Poo Poo Pee Pee')">
    Poo Poo Button
  </button>

</body>
<div class="container">
  <div style="padding: 1px; background-color: rgba(81, 217, 255, 0.392);" class="box">
    <h2 style="margin: 0px;font-size: 22px"> Currently Reading:
      <input id=bookName style="
        width: 100%;
        background: none; 
        border: none;
        text-align: center;
        color: white;
        font-size:18px;">
    </h2>

    <div class="field">
      <label>Author:</label>
      <input id=author style="
        width: 100%;
        background: none; 
        border: none;
        text-align: center;
        color: white;
        font-size:12px;">
    </div>

    <div class="field">
      <label>Date Started:</label>
      <input id=dateStarted type="date" style="
        background: none; 
        border: none;
        text-align: center;
        color: white;
        font-size:12px;">
    </div>

    <div class="field">
      <label>Pages Read:</label>
      <input id=pages type="number" style="
        background: none; 
        border: none;
        text-align: center;
        color: white;
        font-size:12px;">
    </div>
  </div>

  <div class="box">
    Section 2
  </div>

 <div class="box">
    Section 3
  </div>

</div>

<script>

const bookInputs = [
    "bookName",
    "author",
    "pages"
];

bookInputs.forEach(function(id) {

    const element = document.getElementById(id);

    // LOAD saved value
    element.value = localStorage.getItem(id) || "";

    // SAVE whenever input changes
    element.addEventListener("input", function() {
        localStorage.setItem(id, element.value);
    });

});

</script>
